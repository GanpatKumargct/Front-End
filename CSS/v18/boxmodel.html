<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box model</title>
    <style>
        .Box{
            color: blue;
            border-color: black;
            box-sizing: border-box;
            border-width: 2px;
            border-style: solid;
            /* box-sizing: border-box; */

        }

        .Box1{
            background-color: blueviolet;
            margin: 2px;
            border: 3px solid black;
            padding: 10px;
            box-sizing: border-box;
        }

        .Box2{
            background-color: burlywood;
            margin: 2px;
            border: 3px solid red;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="Box1 , Box">
        i am a simple box.
    </div>
    <div class="Box2 , Box">
        i am model box
    </div>
</body>
</html>
