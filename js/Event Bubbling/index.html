<!DOCTYPE html>
<html lang="en">
<head>

        .container{
            margin: 10px;

        }

        .childContainer{
            margin: 10px;

            padding: 10px;

<body>

    <div class="container">
        <div class="childContainer">
            <div class="child">
                im a child
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>

</html>
