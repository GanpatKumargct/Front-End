<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector</title>
    <style>
        .box{
            height: 50px;
            width: 50px;
            border-color: 5px solid black;
            background-color: blueviolet;
            margin: 10px;
            padding: 15px 15px;
        }

        .second{
            position: absolute;
            left: 40%;
            top: 5px;
        }
        .dabba{
            height: 50px;
            width: 50px;
            border-color: 5px solid black;
            background-color: blueviolet;
            margin: 10px;
            padding: 15px 15px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box">Box1</div>
        <div class="box">Box2</div>
        <div class="box">Box3</div>
        <div class="box">Box4</div>
        <div class="box" id="redbox">Box5</div>
    </div>

    <div class="second">
        <div class="dabba">Dabba1</div>
        <div class="dabba">Dabba2</div>
        <div class="dabba">Dabba3</div>
        <div class="dabba">Dabba4</div>
        <div class="dabba">Dabba5</div>
    </div>

    <script src="index.js"></script>
</body>
</html>
